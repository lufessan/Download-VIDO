services:
  - type: web
    name: multi-tool-arabic-platform
    env: docker
    autoDeploy: true
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: multi-tool-db
          property: connectionString
      - key: GROQ_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: COOKIE_CONTENT
        sync: false

databases:
  - name: multi-tool-db
    type: postgres
    plan: free
