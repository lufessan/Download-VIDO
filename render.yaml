services:
  - type: web
    name: multi-tool-arabic-platform
    env: docker
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: multi-tool-db
          property: connectionString
    autoDeploy: true

databases:
  - name: multi-tool-db
    type: postgres
    plan: free
